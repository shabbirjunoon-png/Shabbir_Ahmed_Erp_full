name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: shabbir-erp-main
        run: flutter pub get

      - name: Analyze code
        working-directory: shabbir-erp-main
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (release)
        working-directory: shabbir-erp-main
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build APK (debug, always works without signing)
        if: failure()
        working-directory: shabbir-erp-main
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shabbir-erp-apk
          path: |
            shabbir-erp-main/build/app/outputs/flutter-apk/app-release.apk
            shabbir-erp-main/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: shabbir-erp-main/build/app/outputs/flutter-apk/app-release.apk
          name: Shabbir ERP ${{ github.ref_name }}
          body: |
            ## Shabbir ERP Release ${{ github.ref_name }}

            ### Features
            - Ledger with real description/remarks
            - PDF Export with Preview + Download
            - Language toggle (English / Urdu)
            - Light Yellow theme
            - Improved parties UI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
